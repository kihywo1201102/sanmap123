<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>산지도 - 회원가입</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-b from-lime-50 via-green-50 to-emerald-100 min-h-screen flex items-center justify-center p-4">

<div class="bg-white/90 backdrop-blur-sm w-full max-w-md p-8 rounded-3xl shadow-lg border border-lime-200/60 space-y-6 relative">

    <div class="flex justify-start">
        <button onclick="history.back()"
                class="flex items-center space-x-1.5 text-xs font-bold text-green-700 hover:text-green-900 bg-lime-50 hover:bg-lime-100/80 px-3 py-1.5 rounded-xl border border-lime-200/60 shadow-sm transition">
            <i class="fa-solid fa-arrow-left"></i>
            <span>이전으로</span>
        </button>
    </div>

    <div class="text-center space-y-2">
        <div class="text-emerald-600 text-4xl inline-block"><i class="fa-solid fa-mountain-sun"></i></div>
        <h2 class="text-2xl font-black text-green-950 tracking-tight">산지도 시작하기</h2>
        <p class="text-xs text-green-700/80">나만의 최애 산을 공유하고 추천받아 보세요!</p>
    </div>

    <div th:if="${error}" style="display: none;" th:style="${error} ? 'display: flex;' : 'display: none;'"
         class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-xs font-semibold items-start space-x-2 shadow-sm">
        <i class="fa-solid fa-circle-exclamation mt-0.5 text-red-500"></i>
        <span th:text="${error}">조건 위반 시 에러 메시지</span>
    </div>

    <form th:action="@{/auth/signup}" th:object="${userSignupDto}" method="post" class="space-y-4">

        <div class="space-y-1.5">
            <label for="username" class="text-xs font-bold text-green-900 block pl-1">사용할 아이디</label>
            <div class="relative">
                <input type="text" th:field="*{username}" id="username" placeholder="영어/숫자 3~16글자" required
                       maxlength="16"
                       oninput="this.value = this.value.replace(/\s/g, '')"
                       class="w-full bg-gray-50/50 pl-10 pr-4 py-2.5 rounded-xl text-sm border border-gray-200 focus:outline-none focus:bg-white focus:ring-2 focus:ring-green-500 focus:border-green-500 transition">
                <i class="fa-solid fa-user absolute left-3.5 top-3.5 text-gray-400 text-sm"></i>
            </div>
        </div>

        <div class="space-y-1.5">
            <label for="nickname" class="text-xs font-bold text-green-900 block pl-1">멋진 별명</label>
            <div class="relative">
                <input type="text" th:field="*{nickname}" id="nickname" placeholder="2글자 이상 10글자 이하" required
                       maxlength="10"
                       oninput="this.value = this.value.replace(/\s/g, '')"
                       class="w-full bg-gray-50/50 pl-10 pr-4 py-2.5 rounded-xl text-sm border border-gray-200 focus:outline-none focus:bg-white focus:ring-2 focus:ring-green-500 focus:border-green-500 transition">
                <i class="fa-solid fa-id-card absolute left-3.5 top-3.5 text-gray-400 text-sm"></i>
            </div>
        </div>

        <div class="space-y-1.5">
            <label for="password" class="text-xs font-bold text-green-900 block pl-1">비밀번호</label>
            <div class="relative">
                <input type="password" th:field="*{password}" id="password" placeholder="영어/숫자 4~16글자" required
                       maxlength="16"
                       oninput="this.value = this.value.replace(/\s/g, '')"
                       class="w-full bg-gray-50/50 pl-10 pr-12 py-2.5 rounded-xl text-sm border border-gray-200 focus:outline-none focus:bg-white focus:ring-2 focus:ring-green-500 focus:border-green-500 transition">
                <i class="fa-solid fa-lock absolute left-3.5 top-3.5 text-gray-400 text-sm"></i>
                <button type="button" onclick="togglePasswordVisibility('password', 'eye-icon-1')" class="absolute right-3 top-3 text-gray-400 hover:text-green-700">
                    <i id="eye-icon-1" class="fa-solid fa-eye-slash"></i>
                </button>
            </div>
        </div>

        <div class="space-y-1.5">
            <label for="passwordConfirm" class="text-xs font-bold text-green-900 block pl-1">비밀번호 확인</label>
            <div class="relative">
                <input type="password" th:field="*{passwordConfirm}" id="passwordConfirm" placeholder="한번 더 똑같이 입력" required
                       maxlength="16"
                       oninput="this.value = this.value.replace(/\s/g, '')"
                       class="w-full bg-gray-50/50 pl-10 pr-12 py-2.5 rounded-xl text-sm border border-gray-200 focus:outline-none focus:bg-white focus:ring-2 focus:ring-green-500 focus:border-green-500 transition">
                <i class="fa-solid fa-lock-open absolute left-3.5 top-3.5 text-gray-400 text-sm"></i>
                <button type="button" onclick="togglePasswordVisibility('passwordConfirm', 'eye-icon-2')" class="absolute right-3 top-3 text-gray-400 hover:text-green-700">
                    <i id="eye-icon-2" class="fa-solid fa-eye-slash"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition shadow-md hover:shadow-lg mt-2">
            동의하고 가입하기
        </button>
    </form>

    <div class="text-center pt-2 border-t border-gray-100 text-xs text-gray-500">
        이미 계정이 있으신가요? <a href="/auth/login" class="text-emerald-600 font-bold hover:underline ml-1">로그인하기</a>
    </div>

</div>

<script>
    function togglePasswordVisibility(inputId, iconId) {
        const passwordInput = document.getElementById(inputId);
        const eyeIcon = document.getElementById(iconId);

        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            eyeIcon.classList.remove("fa-eye-slash");
            eyeIcon.classList.add("fa-eye");
        } else {
            passwordInput.type = "password";
            eyeIcon.classList.remove("fa-eye");
            eyeIcon.classList.add("fa-eye-slash");
        }
    }
</script>

</body>
</html>
