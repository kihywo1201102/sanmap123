<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>산지도 - 등산 소식 제보하기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-b from-lime-50 via-green-50/40 to-emerald-50 min-h-screen text-green-950 font-sans antialiased">

<header class="bg-green-700 text-white shadow-sm sticky top-0 z-50">
    <div class="max-w-3xl mx-auto px-4 h-16 flex justify-between items-center">
        <div onclick="location.href='/'" class="flex items-center space-x-2 text-xl font-black cursor-pointer">
            <i class="fa-solid fa-mountain-sun text-lime-300"></i><span>산지도</span>
        </div>
        <button onclick="history.back()" class="text-xs font-bold bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-xl transition">돌아가기</button>
    </div>
</header>

<main class="max-w-xl mx-auto px-4 py-10">
    <div class="bg-white p-8 rounded-3xl border border-lime-200 shadow-xl space-y-6">
        <div>
            <h2 class="text-2xl font-black text-green-900">🏔️ 등산 현장 제보하기</h2>
            <p class="text-xs text-green-700">다녀오신 산을 선택하고, 아름다운 전경 사진과 유용한 팁을 나누어 주세요!</p>
        </div>

        <form th:action="@{/post/write}" method="post" enctype="multipart/form-data" class="space-y-4 text-xs font-bold">
            <div>
                <label class="block text-gray-500 mb-1">제보할 대상 산 선택</label>
                <select name="mountainId" required
                        class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-green-500 focus:outline-none">
                    <option value="" disabled th:selected="${preSelectedId == null}">어느 산에 다녀오셨나요?</option>
                    <option th:each="m : ${mountains}"
                            th:value="${m.id}"
                            th:text="${m.name}"
                            th:selected="${preSelectedId != null && preSelectedId == m.id}">청계산</option>
                </select>
            </div>
            <div>
                <label class="block text-gray-500 mb-1">제보 제목</label>
                <input type="text" name="title" placeholder="게시글의 제목을 입력하세요" required
                       class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-green-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-gray-500 mb-1">실시간 코스 후기</label>
                <textarea name="content" rows="4" placeholder="주차 정보나 등산로 상황, 정상 뷰 등의 팁을 적어주세요." required
                          class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-green-500 focus:outline-none"></textarea>
            </div>
            <div>
                <label class="block text-gray-500 mb-1">현장 사진 첨부</label>
                <input type="file" name="photo" accept="image/*"
                       class="w-full bg-gray-50 border border-gray-200 p-2 rounded-xl focus:outline-none">
            </div>
            <button type="submit"
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 rounded-2xl transition shadow-md">소식 제보하기</button>
        </form>
    </div>
</main>

</body>
</html>
