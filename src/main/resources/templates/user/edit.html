<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>산지도 - 내 정보 수정</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-b from-lime-50 via-green-50/40 to-emerald-50 min-h-screen text-green-950 font-sans antialiased">

<header class="bg-green-700 text-white shadow-sm sticky top-0 z-50">
    <div class="max-w-3xl mx-auto px-4 h-16 flex justify-between items-center">
        <div onclick="location.href='/'" class="flex items-center space-x-2 text-xl font-black cursor-pointer">
            <i class="fa-solid fa-mountain-sun text-lime-300"></i><span>산지도</span>
        </div>
        <button onclick="history.back()" class="text-xs font-bold bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-xl transition">돌아가기</button>
    </div>
</header>

<main class="max-w-md mx-auto px-4 py-12">
    <div class="bg-white p-8 rounded-3xl border border-lime-200 shadow-xl space-y-6">
        <div class="text-center">
            <h2 class="text-2xl font-black text-green-900">⚙️ 내 정보 수정</h2>
            <p class="text-xs text-green-700 mt-1">로그인 닉네임과 패스워드를 안전하게 관리하세요</p>
        </div>

        <!-- ⭐️ [오류 메세지 알림창] 입력한 비밀번호들이 매칭되지 않을 때 등장합니다! -->
        <div th:if="${error}" class="bg-red-50 border border-red-200 text-red-700 p-4 rounded-2xl text-xs font-bold flex items-center space-x-2">
            <i class="fa-solid fa-triangle-exclamation text-red-500"></i>
            <span th:text="${error}">에러 내용</span>
        </div>

        <form th:action="@{/user/edit}" method="post" class="space-y-4 text-xs font-bold">

            <!-- 아이디 (수정 불가) -->
            <div>
                <label class="block text-gray-400 mb-1">내 아이디 계정 (수정 불가)</label>
                <input type="text" th:value="${user.username}" readonly
                       class="w-full bg-gray-100 text-gray-400 border border-gray-200 p-3.5 rounded-xl cursor-not-allowed outline-none">
            </div>

            <!-- 닉네임 -->
            <div>
                <label class="block text-gray-500 mb-1">닉네임 변경</label>
                <input type="text" name="nickname" th:value="${user.nickname}" required
                       class="w-full bg-gray-50 border border-gray-200 p-3.5 rounded-xl focus:ring-2 focus:ring-green-500 focus:outline-none">
            </div>

            <!-- ⭐️ [추가] 본인 확인용 기존 비밀번호 (필수) -->
            <div>
                <label class="block text-green-800 mb-1"><i class="fa-solid fa-key mr-1"></i>기존 비밀번호 (본인 확인 필수)</label>
                <input type="password" name="currentPassword" placeholder="본인 확인을 위해 현재 비밀번호를 입력하세요" required
                       class="w-full bg-gray-50 border border-gray-200 p-3.5 rounded-xl focus:ring-2 focus:ring-green-500 focus:outline-none">
            </div>

            <!-- ⭐️ [추가] 새 비밀번호 -->
            <div>
                <label class="block text-gray-500 mb-1">새 비밀번호 (변경할 경우에만 입력)</label>
                <input type="password" name="newPassword" placeholder="변경을 원할 시 새로운 비밀번호를 입력해 주세요"
                       class="w-full bg-gray-50 border border-gray-200 p-3.5 rounded-xl focus:ring-2 focus:ring-green-500 focus:outline-none">
            </div>

            <!-- ⭐️ [추가] 새 비밀번호 확인 -->
            <div>
                <label class="block text-gray-500 mb-1">새 비밀번호 확인 (변경할 경우에만 입력)</label>
                <input type="password" name="confirmPassword" placeholder="새 비밀번호를 똑같이 한 번 더 입력해 주세요"
                       class="w-full bg-gray-50 border border-gray-200 p-3.5 rounded-xl focus:ring-2 focus:ring-green-500 focus:outline-none">
            </div>

            <button type="submit"
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl transition shadow-md text-sm">
                정보 수정 완료
            </button>
        </form>
    </div>
</main>

</body>
</html>
